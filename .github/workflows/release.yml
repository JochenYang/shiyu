name: Release Shiyu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Shiyu
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Install Node dependencies
        run: npm install
        working-directory: ./frontend

      # --- Install Python deps + PyInstaller for backend build ---
      - name: Install Python deps for PyInstaller
        shell: bash
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      # --- Build PyInstaller executable (same command on all platforms) ---
      - name: Build backend executable with PyInstaller
        working-directory: ./backend
        run: python build.py

      # --- Copy backend resources for Tauri: Windows ---
      - name: Copy backend resources (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Remove existing if present
          if (Test-Path frontend/src-tauri/resources/backend) { Remove-Item -Path frontend/src-tauri/resources/backend -Recurse -Force }
          New-Item -ItemType Directory -Force -Path frontend/src-tauri/resources/backend
          Copy-Item -Path backend/dist/shiyu-backend.exe -Destination frontend/src-tauri/resources/backend/shiyu-backend.exe
          Copy-Item -Path backend/config.yaml -Destination frontend/src-tauri/resources/backend/config.yaml

      # --- Copy backend resources for Tauri: macOS ---
      - name: Copy backend resources (macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          rm -rf frontend/src-tauri/resources/backend
          mkdir -p frontend/src-tauri/resources/backend
          cp backend/dist/shiyu-backend frontend/src-tauri/resources/backend/shiyu-backend
          cp backend/config.yaml frontend/src-tauri/resources/backend/config.yaml

      # --- Generate changelog from all commits since last tag ---
      - name: Generate release changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-decorate | head -50
          else
            git log --oneline --no-decorate "$PREV_TAG..HEAD"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      # --- Build & Release Tauri App (All platforms) ---
      - name: Build & Publish Tauri Release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "时语字幕助手 v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.changelog }}
          releaseDraft: true
          prerelease: false
          projectPath: "./frontend"
